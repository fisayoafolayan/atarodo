services:
  ghost:
    image: ghost:6
    ports:
      - "2368:2368"
    volumes:
      - .:/var/lib/ghost/content/themes/atarodo
      - /var/lib/ghost/content/themes/atarodo/.git
      - ghost-data:/var/lib/ghost/content/data
    environment:
      url: http://localhost:2368
      NODE_ENV: development

volumes:
  ghost-data:
